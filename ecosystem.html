<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Ecosystem Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #07071a; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }

  #ui {
    position: fixed;
    top: 14px;
    left: 14px;
    color: #ddd;
    background: rgba(5, 5, 20, 0.82);
    padding: 14px 18px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    min-width: 200px;
    backdrop-filter: blur(6px);
    user-select: none;
  }
  #ui h2 {
    font-size: 11px;
    letter-spacing: 3px;
    color: #667;
    margin-bottom: 12px;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding-bottom: 8px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin: 5px 0;
    font-size: 12px;
  }
  .stat-label { display: flex; align-items: center; gap: 7px; }
  .swatch {
    width: 9px; height: 9px; border-radius: 50%;
    box-shadow: 0 0 5px currentColor;
    flex-shrink: 0;
  }
  .swatch.tri { border-radius: 2px; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
  .swatch.blob { border-radius: 40% 60% 55% 45% / 45% 40% 60% 55%; }
  .val { min-width: 28px; text-align: right; font-weight: bold; }

  .divider { border: none; border-top: 1px solid rgba(255,255,255,0.05); margin: 8px 0; }
  .meta { font-size: 10px; color: #445; margin-top: 2px; }
  .meta span { color: #556; }

  #legend {
    position: fixed;
    bottom: 14px;
    left: 14px;
    font-size: 10px;
    color: #334;
    background: rgba(5,5,20,0.7);
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.04);
  }

  #extinctionAlert {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ff6644;
    font-size: 13px;
    letter-spacing: 2px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
    text-shadow: 0 0 20px #ff4400;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <h2>Ecosystem</h2>
  <div class="stat-row">
    <div class="stat-label"><div class="swatch" style="background:#4dff80;color:#4dff80"></div> Gliders</div>
    <div class="val" id="s-glider" style="color:#4dff80">0</div>
  </div>
  <div class="stat-row">
    <div class="stat-label"><div class="swatch tri" style="background:#ff4d4d;color:#ff4d4d"></div> Hunters</div>
    <div class="val" id="s-hunter" style="color:#ff4d4d">0</div>
  </div>
  <div class="stat-row">
    <div class="stat-label"><div class="swatch blob" style="background:#4da6ff;color:#4da6ff"></div> Growers</div>
    <div class="val" id="s-grower" style="color:#4da6ff">0</div>
  </div>
  <div class="stat-row">
    <div class="stat-label"><div class="swatch" style="background:#ffdd44;color:#ffdd44"></div> Energy Orbs</div>
    <div class="val" id="s-orb" style="color:#ffdd44">0</div>
  </div>
  <div class="stat-row">
    <div class="stat-label"><div class="swatch" style="background:#cc55ff;color:#cc55ff;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)"></div> Rare</div>
    <div class="val" id="s-rare" style="color:#cc55ff">0</div>
  </div>
  <hr class="divider">
  <div class="meta">Generation <span id="s-gen">0</span></div>
  <div class="meta">Elapsed <span id="s-time">0s</span></div>
  <div class="meta">Births <span id="s-births">0</span></div>
  <div class="meta">Deaths <span id="s-deaths">0</span></div>
</div>

<div id="legend">
  Green circles flee predators · Red triangles hunt · Blue blobs grow · Yellow orbs = energy
</div>

<div id="extinctionAlert"></div>

<script>
// ─────────────────────────────────────────────────────────────
//  SETUP
// ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

let UID        = 0;
let frame      = 0;
let generation = 0;
let births     = 0;
let deaths     = 0;
const startTime = Date.now();

// ─────────────────────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────────────────────
const CFG = {
  glider : { init: 28, max: 70,  repro: 80,  energy: 50,  speed: 3.6, size: 5  },
  hunter : { init: 10, max: 28,  repro: 110, energy: 65,  speed: 2.6, size: 9  },
  grower : { init: 7,  max: 18,  repro: 140, energy: 80,  speed: 0.9, size: 15 },
  orb    : { max: 55,  rate: 0.04                                                },
  rare   : { max: 4,   chance: 0.00025                                           },
};

// ─────────────────────────────────────────────────────────────
//  UTILITIES
// ─────────────────────────────────────────────────────────────
const rand    = (a, b) => a + Math.random() * (b - a);
const randInt = (a, b) => Math.floor(rand(a, b));
const clamp   = (v, mn, mx) => Math.max(mn, Math.min(mx, v));
const dist2   = (ax, ay, bx, by) => (ax - bx) ** 2 + (ay - by) ** 2;
const lerp    = (a, b, t) => a + (b - a) * t;

function mutate(val, pct = 0.15) {
  return val * (1 + (Math.random() * 2 - 1) * pct);
}

// ─────────────────────────────────────────────────────────────
//  BASE ORGANISM
// ─────────────────────────────────────────────────────────────
class Organism {
  constructor(type, x, y, size, speed, energy) {
    this.id     = UID++;
    this.type   = type;
    this.x      = x ?? rand(20, W - 20);
    this.y      = y ?? rand(20, H - 20);
    this.size   = size;
    this.speed  = speed;
    this.energy = energy;
    this.vx     = rand(-1, 1) * speed;
    this.vy     = rand(-1, 1) * speed;
    this.age    = 0;
    this.alive  = true;
    this.trail  = [];
    this.trailMax = 10;
  }

  /* ── physics ── */
  step() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x <  this.size)     { this.x =  this.size;     this.vx *= -0.9; }
    if (this.x >  W - this.size) { this.x =  W - this.size; this.vx *= -0.9; }
    if (this.y <  this.size)     { this.y =  this.size;     this.vy *= -0.9; }
    if (this.y >  H - this.size) { this.y =  H - this.size; this.vy *= -0.9; }
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > this.trailMax) this.trail.shift();
    this.age++;
    this.energy -= 0.06 + this.size * 0.002; // larger = costlier
    if (this.energy <= 0) { this.alive = false; deaths++; }
  }

  seek(tx, ty, f = 0.1) {
    const dx = tx - this.x, dy = ty - this.y;
    const d  = Math.sqrt(dx * dx + dy * dy) || 1;
    this.vx += dx / d * f;
    this.vy += dy / d * f;
  }

  flee(tx, ty, f = 0.18) {
    this.seek(this.x * 2 - tx, this.y * 2 - ty, f);
  }

  wander(strength = 0.25) {
    if (Math.random() < 0.025) {
      const a = Math.random() * Math.PI * 2;
      this.vx += Math.cos(a) * strength;
      this.vy += Math.sin(a) * strength;
    }
  }

  limitSpeed(max) {
    const spd = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (spd > max) { this.vx = this.vx / spd * max; this.vy = this.vy / spd * max; }
    if (spd < 0.3) {
      const a = Math.random() * Math.PI * 2;
      this.vx += Math.cos(a) * 0.4;
      this.vy += Math.sin(a) * 0.4;
    }
  }

  /* ── drawing helpers ── */
  drawTrail(color, alpha = 0.18) {
    if (this.trail.length < 3) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = color;
    ctx.lineWidth   = this.size * 0.6;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.beginPath();
    ctx.moveTo(this.trail[0].x, this.trail[0].y);
    for (let i = 1; i < this.trail.length; i++)
      ctx.lineTo(this.trail[i].x, this.trail[i].y);
    ctx.stroke();
    ctx.restore();
  }

  drawBar(maxEnergy, color) {
    const bw  = this.size * 2.4;
    const bh  = 2.5;
    const bx  = this.x - bw / 2;
    const by  = this.y - this.size - 7;
    const pct = clamp(this.energy / maxEnergy, 0, 1);
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = pct > 0.65 ? color : pct > 0.35 ? '#ffee44' : '#ff3333';
    ctx.fillRect(bx, by, bw * pct, bh);
  }
}

// ─────────────────────────────────────────────────────────────
//  ENERGY ORB
// ─────────────────────────────────────────────────────────────
class EnergyOrb {
  constructor(x, y) {
    this.type    = 'orb';
    this.alive   = true;
    this.x       = x ?? rand(8, W - 8);
    this.y       = y ?? rand(8, H - 8);
    this.size    = rand(2.5, 5.5);
    this.energy  = rand(12, 28);
    this.phase   = rand(0, Math.PI * 2);
    this.phaseSpd= rand(0.04, 0.09);
    this.vx      = rand(-0.25, 0.25);
    this.vy      = rand(-0.25, 0.25);
  }

  update() {
    this.x = clamp(this.x + this.vx, 4, W - 4);
    this.y = clamp(this.y + this.vy, 4, H - 4);
    this.phase += this.phaseSpd;
  }

  draw() {
    const r = this.size * (1 + 0.28 * Math.sin(this.phase));
    ctx.save();
    ctx.shadowBlur  = 12;
    ctx.shadowColor = '#ffcc00';
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
    g.addColorStop(0,   '#ffffff');
    g.addColorStop(0.35,'#ffff99');
    g.addColorStop(1,   '#ffaa00');
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────────
//  GLIDER
// ─────────────────────────────────────────────────────────────
class Glider extends Organism {
  constructor(x, y, size, speed, energy) {
    super('glider', x, y,
      size  ?? rand(CFG.glider.size - 1.5, CFG.glider.size + 2.5),
      speed ?? rand(CFG.glider.speed - 0.5, CFG.glider.speed + 1.5),
      energy ?? CFG.glider.energy);
    this.wave = rand(0, Math.PI * 2);
    this.waveSpd = rand(0.08, 0.14);
  }

  update(all) {
    let threatX = 0, threatY = 0, threatFound = false, threatDist = 160;
    let orbX = 0, orbY = 0, orbFound = false, orbDist = 220;

    for (const o of all) {
      if (!o.alive || o === this) continue;
      const d2 = dist2(this.x, this.y, o.x, o.y);

      if (o.type === 'hunter' && d2 < threatDist * threatDist) {
        const d = Math.sqrt(d2);
        if (d < threatDist) { threatX = o.x; threatY = o.y; threatFound = true; threatDist = d; }
      }
      if (o.type === 'grower' && o.size > this.size * 1.8 && d2 < (threatDist * 1.2) ** 2) {
        const d = Math.sqrt(d2);
        if (d < threatDist * 1.2) { threatX = o.x; threatY = o.y; threatFound = true; }
      }
      if (o.type === 'orb' && d2 < orbDist * orbDist) {
        const d = Math.sqrt(d2);
        if (d < orbDist) { orbX = o.x; orbY = o.y; orbFound = true; orbDist = d; }
      }
    }

    if (threatFound) this.flee(threatX, threatY, 0.32);
    else if (orbFound) this.seek(orbX, orbY, 0.09);
    else this.wander(0.28);

    this.limitSpeed(this.speed);
    this.step();
    this.wave += this.waveSpd;

    // Absorb orbs
    for (const o of all) {
      if (!o.alive || o.type !== 'orb') continue;
      if (dist2(this.x, this.y, o.x, o.y) < (this.size + o.size) ** 2) {
        this.energy += o.energy;
        o.alive = false;
      }
    }

    // Reproduce
    const gliderCount = all.filter(o => o.type === 'glider').length;
    if (this.energy > CFG.glider.repro && gliderCount < CFG.glider.max) {
      this.energy *= 0.52;
      births++;
      generation++;
      return new Glider(
        this.x + rand(-18, 18), this.y + rand(-18, 18),
        mutate(this.size), mutate(this.speed), this.energy * 0.6
      );
    }
    return null;
  }

  draw() {
    this.drawTrail('#3dff70');
    const pulse = 1 + 0.13 * Math.sin(this.wave);
    const r = this.size * pulse;
    ctx.save();
    ctx.shadowBlur  = 14;
    ctx.shadowColor = '#00ff55';
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    const g = ctx.createRadialGradient(this.x - r * 0.35, this.y - r * 0.35, 0, this.x, this.y, r);
    g.addColorStop(0,   '#ccffe0');
    g.addColorStop(0.55,'#4dff80');
    g.addColorStop(1,   '#00aa33');
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
    this.drawBar(CFG.glider.repro, '#3dff70');
  }
}

// ─────────────────────────────────────────────────────────────
//  HUNTER
// ─────────────────────────────────────────────────────────────
class Hunter extends Organism {
  constructor(x, y, size, speed, energy) {
    super('hunter', x, y,
      size  ?? rand(CFG.hunter.size - 2, CFG.hunter.size + 3),
      speed ?? rand(CFG.hunter.speed - 0.4, CFG.hunter.speed + 1.2),
      energy ?? CFG.hunter.energy);
    this.angle    = rand(0, Math.PI * 2);
    this.trailMax = 12;
    this.hunger   = 0; // frames since last meal
  }

  update(all) {
    let preyX = 0, preyY = 0, preyFound = false, preyDist = 210, preyRef = null;
    let bigX  = 0, bigY  = 0, bigFound  = false, bigDist  = 120;

    for (const o of all) {
      if (!o.alive || o === this) continue;
      const d2 = dist2(this.x, this.y, o.x, o.y);

      // Flee bigger hunters
      if (o.type === 'hunter' && o.size > this.size * 1.25 && d2 < bigDist ** 2) {
        const d = Math.sqrt(d2);
        if (d < bigDist) { bigX = o.x; bigY = o.y; bigFound = true; bigDist = d; }
      }

      // Hunt smaller organisms
      const huntable =
        (o.type === 'glider') ||
        (o.type === 'orb') ||
        (o.type === 'grower' && o.size < this.size * 0.75);

      if (huntable && d2 < preyDist ** 2) {
        const d = Math.sqrt(d2);
        if (d < preyDist) { preyX = o.x; preyY = o.y; preyFound = true; preyDist = d; preyRef = o; }
      }
    }

    if (bigFound) this.flee(bigX, bigY, 0.22);
    else if (preyFound) this.seek(preyX, preyY, 0.17);
    else this.wander(0.32);

    this.limitSpeed(this.speed + (this.hunger > 120 ? 0.5 : 0));
    this.step();
    this.hunger++;

    // Update facing angle
    if (Math.abs(this.vx) > 0.05 || Math.abs(this.vy) > 0.05)
      this.angle = Math.atan2(this.vy, this.vx);

    // Eat prey on contact
    for (const o of all) {
      if (!o.alive || o === this) continue;
      if (!['glider', 'orb', 'grower'].includes(o.type)) continue;
      if (o.type === 'grower' && o.size >= this.size * 0.75) continue;
      if (dist2(this.x, this.y, o.x, o.y) < (this.size + o.size * 0.75) ** 2) {
        this.energy += o.size * 3.5 + 12;
        this.size    = Math.min(this.size + 0.12, 22);
        this.hunger  = 0;
        o.alive      = false;
        deaths++;
      }
    }

    // Reproduce
    const hunterCount = all.filter(o => o.type === 'hunter').length;
    if (this.energy > CFG.hunter.repro && hunterCount < CFG.hunter.max) {
      this.energy *= 0.50;
      births++;
      generation++;
      return new Hunter(
        this.x + rand(-22, 22), this.y + rand(-22, 22),
        mutate(this.size, 0.2), mutate(this.speed, 0.15), this.energy * 0.6
      );
    }
    return null;
  }

  draw() {
    this.drawTrail('#ff3333', 0.22);
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle + Math.PI / 2);
    ctx.shadowBlur  = 16;
    ctx.shadowColor = '#ff0000';

    const s = this.size;
    ctx.beginPath();
    ctx.moveTo(0, -s * 1.35);
    ctx.lineTo(-s * 0.95, s * 0.85);
    ctx.lineTo(0,  s * 0.4);
    ctx.lineTo(s * 0.95, s * 0.85);
    ctx.closePath();
    const g = ctx.createLinearGradient(0, -s * 1.35, 0, s * 0.85);
    g.addColorStop(0,   '#ff9999');
    g.addColorStop(0.5, '#ff4444');
    g.addColorStop(1,   '#aa0000');
    ctx.fillStyle = g;
    ctx.fill();

    // Eyes
    ctx.shadowBlur = 0;
    ctx.fillStyle  = '#fff';
    ctx.beginPath(); ctx.arc(-s * 0.32, -s * 0.28, s * 0.22, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( s * 0.32, -s * 0.28, s * 0.22, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(-s * 0.32 + 1.2, -s * 0.28, s * 0.11, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( s * 0.32 + 1.2, -s * 0.28, s * 0.11, 0, Math.PI * 2); ctx.fill();
    // Pupils glow
    ctx.fillStyle  = 'rgba(255,50,50,0.6)';
    ctx.beginPath(); ctx.arc(-s * 0.32, -s * 0.28, s * 0.07, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( s * 0.32, -s * 0.28, s * 0.07, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
    this.drawBar(CFG.hunter.repro, '#ff6644');
  }
}

// ─────────────────────────────────────────────────────────────
//  GROWER
// ─────────────────────────────────────────────────────────────
class Grower extends Organism {
  constructor(x, y, size, speed, energy) {
    super('grower', x, y,
      size  ?? rand(CFG.grower.size - 3, CFG.grower.size + 5),
      speed ?? rand(CFG.grower.speed - 0.2, CFG.grower.speed + 0.6),
      energy ?? CFG.grower.energy);
    this.blobSeeds = Array.from({ length: 10 }, () => rand(0.65, 1.35));
    this.blobPhase = 0;
    this.blobSpd   = rand(0.015, 0.035);
    this.trailMax  = 6;
  }

  update(all) {
    let orbX = 0, orbY = 0, orbFound = false, orbDist = 280;
    let fleeX = 0, fleeY = 0, fleeFound = false, fleeDist = 130;

    for (const o of all) {
      if (!o.alive || o === this) continue;
      const d2 = dist2(this.x, this.y, o.x, o.y);

      if (o.type === 'orb' && d2 < orbDist ** 2) {
        const d = Math.sqrt(d2);
        if (d < orbDist) { orbX = o.x; orbY = o.y; orbFound = true; orbDist = d; }
      }
      // Only flee hunters that are big enough to be a threat
      if (o.type === 'hunter' && o.size >= this.size * 0.65 && d2 < fleeDist ** 2) {
        const d = Math.sqrt(d2);
        if (d < fleeDist) { fleeX = o.x; fleeY = o.y; fleeFound = true; fleeDist = d; }
      }
    }

    if (fleeFound) this.flee(fleeX, fleeY, 0.12);
    else if (orbFound) this.seek(orbX, orbY, 0.06);
    else this.wander(0.18);

    this.limitSpeed(this.speed);
    this.step();
    this.blobPhase += this.blobSpd;

    // Absorb orbs
    for (const o of all) {
      if (!o.alive || o.type !== 'orb') continue;
      if (dist2(this.x, this.y, o.x, o.y) < (this.size + o.size) ** 2) {
        this.energy += o.energy * 1.6;
        this.size    = Math.min(this.size + 0.55, 38);
        o.alive      = false;
      }
    }

    // Absorb much smaller gliders
    for (const o of all) {
      if (!o.alive || o.type !== 'glider') continue;
      if (this.size > o.size * 2.8 && dist2(this.x, this.y, o.x, o.y) < (this.size * 0.85) ** 2) {
        this.energy += o.energy * 0.8;
        this.size    = Math.min(this.size + 0.15, 38);
        o.alive      = false;
        deaths++;
      }
    }

    // Reproduce (splits)
    const growerCount = all.filter(o => o.type === 'grower').length;
    if (this.energy > CFG.grower.repro && growerCount < CFG.grower.max) {
      this.energy *= 0.50;
      this.size   *= 0.78;
      births++;
      generation++;
      return new Grower(
        this.x + rand(-30, 30), this.y + rand(-30, 30),
        mutate(this.size, 0.18), mutate(this.speed, 0.12), this.energy * 0.55
      );
    }
    return null;
  }

  draw() {
    this.drawTrail('#2266ff', 0.14);
    const n = this.blobSeeds.length;
    ctx.save();
    ctx.shadowBlur  = 22;
    ctx.shadowColor = '#2244ff';

    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const idx = i % n;
      const t   = this.blobPhase;
      const r   = this.size * this.blobSeeds[idx] * (1 + 0.12 * Math.sin(t + idx * 1.4));
      const ang = (idx / n) * Math.PI * 2 - Math.PI / 2;
      const px  = this.x + Math.cos(ang) * r;
      const py  = this.y + Math.sin(ang) * r;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();

    const g = ctx.createRadialGradient(
      this.x - this.size * 0.3, this.y - this.size * 0.3, 0,
      this.x, this.y, this.size * 1.1
    );
    g.addColorStop(0,   '#aaddff');
    g.addColorStop(0.45,'#4da6ff');
    g.addColorStop(1,   '#002299');
    ctx.fillStyle  = g;
    ctx.globalAlpha = 0.88;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
    this.drawBar(CFG.grower.repro, '#4da6ff');
  }
}

// ─────────────────────────────────────────────────────────────
//  RARE ORGANISM (Pulsarite)
// ─────────────────────────────────────────────────────────────
class Rare extends Organism {
  constructor(x, y) {
    super('rare', x ?? rand(50, W - 50), y ?? rand(50, H - 50),
      rand(9, 16), rand(2.2, 3.4), 200);
    this.spin     = rand(0, Math.PI * 2);
    this.spinSpd  = rand(0.02, 0.06) * (Math.random() < 0.5 ? 1 : -1);
    this.spikes   = randInt(5, 9);
    this.hue      = randInt(260, 310);
    this.trailMax = 14;
    this.energy   = 200; // high energy
  }

  update(all) {
    let nearestThreat = null, nd2 = 200 ** 2;

    for (const o of all) {
      if (!o.alive || o === this) continue;
      const d2 = dist2(this.x, this.y, o.x, o.y);
      if ((o.type === 'hunter' || o.type === 'grower') && o.size >= this.size * 0.5 && d2 < nd2) {
        nearestThreat = o; nd2 = d2;
      }
    }

    if (nearestThreat) this.flee(nearestThreat.x, nearestThreat.y, 0.28);
    else {
      // Seek orbs
      let bestOrb = null, bd2 = 350 ** 2;
      for (const o of all) {
        if (!o.alive || o.type !== 'orb') continue;
        const d2 = dist2(this.x, this.y, o.x, o.y);
        if (d2 < bd2) { bestOrb = o; bd2 = d2; }
      }
      if (bestOrb) this.seek(bestOrb.x, bestOrb.y, 0.11);
      else this.wander(0.30);
    }

    this.limitSpeed(this.speed);
    this.step();
    this.spin += this.spinSpd;

    for (const o of all) {
      if (!o.alive || o.type !== 'orb') continue;
      if (dist2(this.x, this.y, o.x, o.y) < (this.size + o.size) ** 2) {
        this.energy += o.energy * 2.2;
        o.alive = false;
      }
    }
    return null; // no reproduction
  }

  draw() {
    this.drawTrail(`hsl(${this.hue}, 100%, 60%)`, 0.22);
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.spin);
    ctx.shadowBlur  = 24;
    ctx.shadowColor = `hsl(${this.hue}, 100%, 60%)`;

    ctx.beginPath();
    const n = this.spikes;
    for (let i = 0; i < n * 2; i++) {
      const ang = (i / (n * 2)) * Math.PI * 2 - Math.PI / 2;
      const r   = (i % 2 === 0) ? this.size : this.size * 0.42;
      i === 0
        ? ctx.moveTo(Math.cos(ang) * r, Math.sin(ang) * r)
        : ctx.lineTo(Math.cos(ang) * r, Math.sin(ang) * r);
    }
    ctx.closePath();
    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
    g.addColorStop(0,   '#ffffff');
    g.addColorStop(0.3, `hsl(${this.hue}, 100%, 80%)`);
    g.addColorStop(1,   `hsl(${this.hue + 20}, 100%, 35%)`);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
    this.drawBar(250, `hsl(${this.hue}, 80%, 65%)`);
  }
}

// ─────────────────────────────────────────────────────────────
//  WORLD
// ─────────────────────────────────────────────────────────────
let entities = [];

function populate() {
  entities = [];
  for (let i = 0; i < CFG.glider.init; i++) entities.push(new Glider());
  for (let i = 0; i < CFG.hunter.init; i++) entities.push(new Hunter());
  for (let i = 0; i < CFG.grower.init; i++) entities.push(new Grower());
  for (let i = 0; i < 32;              i++) entities.push(new EnergyOrb());
}

// ─────────────────────────────────────────────────────────────
//  EXTINCTION ALERT
// ─────────────────────────────────────────────────────────────
const alertEl    = document.getElementById('extinctionAlert');
let   alertTimer = 0;

function showAlert(msg) {
  alertEl.textContent = msg;
  alertEl.style.opacity = 1;
  alertTimer = 180;
}

// ─────────────────────────────────────────────────────────────
//  UPDATE
// ─────────────────────────────────────────────────────────────
function update() {
  // Spawn energy orbs
  const orbCount = entities.filter(e => e.type === 'orb').length;
  if (orbCount < CFG.orb.max && Math.random() < CFG.orb.rate) {
    entities.push(new EnergyOrb());
  }

  // Spawn rare
  const rareCount = entities.filter(e => e.type === 'rare').length;
  if (rareCount < CFG.rare.max && Math.random() < CFG.rare.chance) {
    entities.push(new Rare());
  }

  // Ecosystem self-balance: respawn extinct species
  const gliderCount = entities.filter(e => e.type === 'glider').length;
  const hunterCount = entities.filter(e => e.type === 'hunter').length;
  const growerCount = entities.filter(e => e.type === 'grower').length;

  if (gliderCount === 0 && frame % 90 === 0) {
    showAlert('Gliders Recolonising!');
    for (let i = 0; i < 6; i++) entities.push(new Glider());
  }
  if (hunterCount === 0 && frame % 180 === 0) {
    showAlert('New Hunter Pack!');
    for (let i = 0; i < 3; i++) entities.push(new Hunter());
  }
  if (growerCount === 0 && frame % 120 === 0) {
    showAlert('Growers Return!');
    for (let i = 0; i < 3; i++) entities.push(new Grower());
  }

  // Alert fade
  if (alertTimer > 0) {
    alertTimer--;
    if (alertTimer === 0) alertEl.style.opacity = 0;
  }

  // Update orbs separately
  for (const e of entities) if (e.type === 'orb') e.update();

  // Update organisms, collect children
  const offspring = [];
  for (const e of entities) {
    if (!e.alive || e.type === 'orb') continue;
    const child = e.update(entities);
    if (child) offspring.push(child);
  }
  entities.push(...offspring);
  entities = entities.filter(e => e.alive);

  frame++;
}

// ─────────────────────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle = 'rgba(7, 7, 26, 0.82)';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.018)';
  ctx.lineWidth   = 0.5;
  const gs = 55;
  for (let x = 0; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  ctx.restore();
}

function render() {
  drawBackground();

  // Layer order: orbs → growers → gliders → hunters → rare
  const layers = { orb: [], grower: [], glider: [], hunter: [], rare: [] };
  for (const e of entities) if (layers[e.type]) layers[e.type].push(e);

  for (const e of layers.orb)    e.draw();
  for (const e of layers.grower) e.draw();
  for (const e of layers.glider) e.draw();
  for (const e of layers.hunter) e.draw();
  for (const e of layers.rare)   e.draw();

  // Update HUD every 8 frames
  if (frame % 8 === 0) {
    document.getElementById('s-glider').textContent = layers.glider.length;
    document.getElementById('s-hunter').textContent = layers.hunter.length;
    document.getElementById('s-grower').textContent = layers.grower.length;
    document.getElementById('s-orb').textContent    = layers.orb.length;
    document.getElementById('s-rare').textContent   = layers.rare.length;
    document.getElementById('s-gen').textContent    = generation;
    document.getElementById('s-births').textContent = births;
    document.getElementById('s-deaths').textContent = deaths;
    const sec = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('s-time').textContent =
      sec < 60 ? sec + 's' : Math.floor(sec / 60) + 'm ' + (sec % 60) + 's';
  }
}

// ─────────────────────────────────────────────────────────────
//  LOOP
// ─────────────────────────────────────────────────────────────
populate();

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
